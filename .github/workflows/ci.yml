name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install "stable-baselines3>=2.3,<3" "gymnasium>=0.29" "numpy>=1.26" "scipy>=1.11" "scikit-learn>=1.3" "matplotlib>=3.8" "pytest>=7.4"
        shell: bash
      - name: Run test suite
        run: python -m pytest tests/ -q
      - name: Smoke training (PPO + Lagrangian, 2 episodes)
        run: |
          python - <<'EOF'
          import warnings; warnings.filterwarnings("ignore")
          from src.train.train_ppo_lagrangian import train_ppo_lagrangian
          from src.train.config import get_env_config
          cfg = get_env_config(endogenous=True, churn_multiplier=3)
          model, cb, lam = train_ppo_lagrangian(
              seed=42, cost_limit_raw=3700.0,
              total_timesteps=720 * 2, env_config=cfg)
          assert cb.lam_history, "dual ascent produced no updates"
          print("smoke OK, lam =", lam[0])
          EOF
        shell: bash
